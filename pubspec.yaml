name: equeue
description: Smart Queue Management System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.8.4
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.5
  flutter_local_notifications: ^18.0.1
  fl_chart: ^0.70.2
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  intl: ^0.19.0
  cached_network_image: ^3.4.1
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
